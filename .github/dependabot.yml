version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      labels:
          - "dependabot"
      commit-message:
          prefix: "chore"
      open-pull-requests-limit: 10
      cooldown:
          default-days: 7
          semver-major-days: 14
          semver-minor-days: 7
          semver-patch-days: 7
          include:
              - "*"
      groups:
          npm-all:
              patterns:
                  - "*"
              update-types:
                  - "major"
                  - "minor"
                  - "patch"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      labels:
          - "dependabot"
      commit-message:
          prefix: "chore"
      open-pull-requests-limit: 5
      cooldown:
          default-days: 7
          include:
              - "*"
      groups:
          actions-all:
              patterns:
                  - "*"
              update-types:
                  - "major"
                  - "minor"
                  - "patch"
