version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      commit-message:
          prefix: "chore"
      labels:
          - "dependabot"
      groups:
          npm-deps:
              patterns:
                  - "*"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      commit-message:
          prefix: "chore"
      labels:
          - "dependabot"
      groups:
          actions-deps:
              patterns:
                  - "*"
