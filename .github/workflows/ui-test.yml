name: UI Test

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    pull_request:
        branches: ["master"]

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            checks: write

        steps:
            - name: Checkout Code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Format Check
              run: npm run format:check

            - name: Lint Check
              run: npm run lint

            - name: Run Tests
              run: npm run test:ci

            - name: Report Test Results
              uses: dorny/test-reporter@v3
              if: always()
              with:
                  name: Vitest Results
                  path: junit.xml
                  reporter: jest-junit

            - name: Build Static Files
              run: npm run build
