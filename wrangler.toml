name = "live-transcript-app"
compatibility_date = "2026-03-12"
main = "./src/worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"

[[routes]]
pattern = "www.duck-automata.com/live-transcript"
zone_name = "duck-automata.com"

[[routes]]
pattern = "www.duck-automata.com/live-transcript/*"
zone_name = "duck-automata.com"

[env.dev]
name = "live-transcript-dev"

[[env.dev.routes]]
pattern = "dev.duck-automata.com/live-transcript"
zone_name = "duck-automata.com"

[[env.dev.routes]]
pattern = "dev.duck-automata.com/live-transcript/*"
zone_name = "duck-automata.com"
